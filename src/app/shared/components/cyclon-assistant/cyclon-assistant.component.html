<!-- Widget CYCLON -->
<div class="cyclon-widget" [class.expanded]="isExpanded">
  <!-- Header con animación -->
  <div class="cyclon-header" 
       (click)="toggle()"
       [title]="!isExpanded ? (language === 'es' ? 'CYCLON. Asistente virtual' : 'CYCLON. Virtual assistant') : ''">
    <div class="cyclon-avatar">
      <div class="cyclon-spiral"></div>
      <div class="wind-particles">
        <div class="wind-particle"></div>
        <div class="wind-particle"></div>
        <div class="wind-particle"></div>
      </div>
    </div>
    <span class="cyclon-name">CYCLON</span>
    <div class="cyclon-status" [class.online]="true"></div>
  </div>

  <!-- Chat Container -->
  <div class="cyclon-chat" *ngIf="isExpanded">
    <!-- Chat Header -->
    <div class="chat-header">
      <span>{{ language === 'es' ? '🤖 CYCLON Asistente' : '🤖 CYCLON Assistant' }}</span>
      <button class="clear-btn" (click)="clearChat()" [title]="language === 'es' ? 'Limpiar chat' : 'Clear chat'">
        <svg width="16" height="16" viewBox="0 0 16 16">
          <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/>
          <path d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708z"/>
        </svg>
      </button>
    </div>

    <!-- Messages -->
    <div class="chat-messages">
      <div *ngFor="let message of messages" 
           class="message" 
           [class.user]="message.type === 'user'"
           [class.assistant]="message.type === 'assistant'">
        
        <div class="message-avatar" *ngIf="message.type === 'assistant'">
          <div class="mini-cyclon">
            <div class="mini-spiral"></div>
          </div>
        </div>

        <div class="message-content">
          <div class="message-text">{{ message.message }}</div>
          
          <!-- Suggestions -->
          <div class="suggestions" *ngIf="message.suggestions && message.suggestions.length > 0">
            <button *ngFor="let suggestion of message.suggestions" 
                    class="suggestion-btn"
                    (click)="executeSuggestion(suggestion)">
              {{ suggestion }}
            </button>
          </div>

          <!-- Actions -->
          <div class="actions" *ngIf="message.actions && message.actions.length > 0">
            <button *ngFor="let action of message.actions"
                    class="action-btn"
                    (click)="executeAction(action)">
              {{ action.label }}
            </button>
          </div>
        </div>
      </div>

      <!-- Typing indicator -->
      <div class="message assistant" *ngIf="isTyping">
        <div class="message-avatar">
          <div class="mini-cyclon typing">
            <div class="mini-spiral"></div>
          </div>
        </div>
        <div class="message-content">
          <div class="typing-indicator">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
      </div>
    </div>

    <!-- Input -->
    <div class="chat-input">
      <input type="text" 
             [(ngModel)]="currentMessage"
             (keypress)="onKeyPress($event)"
             [placeholder]="language === 'es' ? 'Pregúntame algo...' : 'Ask me something...'"
             class="message-input">
      <button (click)="sendMessage()" 
              [disabled]="!currentMessage.trim()"
              class="send-btn">
        <svg width="16" height="16" viewBox="0 0 16 16">
          <path d="M15.854.146a.5.5 0 0 1 .11.54L13.026 8.74a.5.5 0 0 1-.708.708L8.74 13.026a.5.5 0 0 1-.54-.11L.146.854a.5.5 0 0 1 .708-.708L8 7.293 15.146.146a.5.5 0 0 1 .708 0z"/>
        </svg>
      </button>
    </div>
  </div>
</div>
